<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Solutions | Custom Automation</title>
    <style>
        /* Professional Styling */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h1 { color: #166534; text-align: center; margin-bottom: 10px; font-size: 24px; }
        p { text-align: center; color: #667; font-size: 14px; margin-bottom: 25px; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        input:focus, textarea:focus { border-color: #166534; outline: none; box-shadow: 0 0 5px rgba(22, 101, 52, 0.2); }
        
        button { width: 100%; background-color: #166534; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #114d27; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="card">
    <h1>EXCEL CUSTOM ORDER</h1>
    <p>Get your automated templates & macros built by a pro.</p>
    
    <form action="https://formspree.io/f/xrerkadk" method="POST">
        
        <label>Full Name</label>
        <input type="text" name="Client Name" placeholder="Enter your name" required>

        <label>Template Type</label>
        <select name="Service Type">
            <option value="School Management">School / Education Tool</option>
            <option value="Business Inventory">Business / Inventory</option>
            <option value="Data Consolidation">Data Consolidation / Macros</option>
        </select>

        <label>Project Details</label>
        <textarea name="Project Details" rows="4" placeholder="Describe the formulas or automation you need..." required></textarea>

        <label>Budget (PHP)</label>
        <input type="number" name="Budget" placeholder="e.g. 1000">

        <button type="submit">Submit Request</button>
    </form>
</div>

</body>
</html>
